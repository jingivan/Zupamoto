 PHASE 5 — Contact Page (contact.html) [UPDATED — IN PROGRESS]
════════════════════════════════════════════════════════
Goal: Complete contact.html — HTML is done, CSS + JS still needed.

What's Done
 [x] contact.html HTML structure (415 lines):
       — Nav (same pattern as gallery.html / models.html)
       — Page header: .contact-header / .contact-bg-text / eyebrow / h1 / subtitle
       — Two-column layout: .contact-body (.contact-info + .contact-form-wrap)
       — Left panel: address, phone, email, hours, socials (all with SVG icons)
       — Right panel: inquiry form (.contact-form)
             Name + Last Name (2-col row), Email, Phone (optional)
             Model Interest dropdown (all 5 bikes + General Inquiry)
             Message textarea, Submit button with spinner
       — Success state: .contact-success with icon, title, text, reset button
       — Footer (same pattern as all other pages)
       — Favicon, unique <title> and <meta description>

What's Still Needed
 [ ] Contact CSS — add to style.css after gallery section:
       .contact-page base layout (padding-top: 80px, min-height)
       .contact-header + .contact-bg-text (same pattern as .gallery-header)
       .contact-eyebrow / .contact-title em / .contact-subtitle
       .contact-body-section + .contact-body (two-column flex/grid)
       .contact-info panel — heading, list, items, icons, socials
       .contact-form-wrap / .contact-form
       .form-group / .form-label / .form-label-optional
       .form-input / .form-textarea — focus glow (--accent cyan)
       .form-select-wrap / .form-select / .form-select-arrow
       .form-row (two-col inline for name/lastname fields)
       .form-error (red text, shown on validation fail)
       .form-submit — CTA button (same style as .cta-link; arrow icon)
       .form-submit-spinner — animated ring (hidden until submitting)
       .contact-success — animated confirmation panel
       .contact-success-icon / .contact-success-title / .contact-success-text
       .contact-success-reset — secondary button
       Responsive breakpoints (stack to 1 column on mobile)

 [ ] Contact JS — add new IIFE to script.js after gallery IIFE:
       Guard: if (!document.querySelector('.contact-page')) return
       Field validation on submit:
         — Name: required, non-empty
         — Email: required, valid format regex
         — Phone: optional, but if filled must be valid format
         — Model: required, must select a non-empty value
         — Message: required, minimum ~10 chars
       Show .form-error spans per field on failure
       Clear .form-error on field input/change
       Submit handler: prevent default, validate all, show spinner,
         simulate async (setTimeout ~1.2s), hide form, show .contact-success
       Reset: #contact-success-reset click → hide success, show form, reset fields
       Accessibility: focus first error field on validation fail

Files Affected
contact.html          → no changes needed (HTML complete)
asset/css/style.css   → add ~180–220 lines of contact + form CSS at end of file
asset/js/script.js    → add contact/form IIFE (~70–90 lines) after gallery IIFE
Estimated Effort: ~1.5–2.5 hours (down from 3–4 since HTML is done)


