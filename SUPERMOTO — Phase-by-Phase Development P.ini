Phase 7 — Performance & Polish
Goal: Optimize assets, smooth out rough edges, and prep for final review.

Tasks
 Image optimization — Compress all asset/img/ PNGs (currently 700KB–1.6MB each); convert to WebP format
 Lazy loading — Add loading="lazy" to all non-hero images
 CSS custom scrollbar — Thin cyan-accent scrollbar for Webkit browsers
 Page transition animation — Fade-out on nav click, fade-in on page load
 resize.ps1 usage — Use the existing script to batch-resize oversized images
 SEO meta tags — Add unique <title> and <meta name="description"> per page
 Favicon — Add a minimal SVG favicon matching the hex logo
Files Affected
All HTML files → lazy loading, meta tags, favicon link
asset/css/style.css → Scrollbar, page transition
asset/js/script.js  → Page transition trigger
asset/img/ → Compressed/WebP versions
Estimated Effort: ~2 hours
Phase 8 — Final QA & Cross-Browser Testing
Goal: Validate everything works across breakpoints and browsers.

Checklist
 Test all pages at: 1920px, 1280px, 1024px, 768px, 480px, 375px
 Verify carousel works on touch devices (swipe gesture)
 Check all nav links route to correct pages
 Confirm preloader hides correctly on all pages
 Validate HTML via W3C validator
 Check keyboard navigation (Tab, Enter, Arrow, ESC)
 Test in Chrome, Edge, Firefox, Safari (if available)
 Verify all images load (no 404s)
