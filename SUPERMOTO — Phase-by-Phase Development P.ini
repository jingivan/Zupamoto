 PHASE 6 — Shared Components (Nav + Footer) [UPDATED]
════════════════════════════════════════════════════════
Goal: Backfill consistent chrome to index.html and ensure all new pages share the same pattern.

Remaining Tasks
 [ ] Add footer to index.html — copy the .site-footer block from models.html
 [ ] Sticky nav on index.html — on scroll, add a .scrolled class to .nav that applies
       backdrop-filter: blur(16px) + subtle border (same pattern as .models-nav)
 [ ] Auto active-link by pathname — replace click-based active with:
       const page = window.location.pathname.split('/').pop() || 'index.html';
       document.querySelectorAll('.nav-link').forEach(link => {
         link.classList.toggle('active', link.getAttribute('href') === page);
       });
 [ ] Ensure specs.html, gallery.html, contact.html copy the same nav + footer HTML

Files Affected
index.html        → Add footer block, add scroll listener for .scrolled class
asset/css/style.css → Add .nav.scrolled styles for hero page
asset/js/script.js  → Add scroll event for .scrolled, replace click-active with pathname detection
Estimated Effort: ~1 hour (most work already done in models.html)


