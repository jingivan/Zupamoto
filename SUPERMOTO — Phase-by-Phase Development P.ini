Phase 1 — Hero Section Polish & Completeness
Goal: Make the existing hero pixel-perfect and fully functional before expanding.

Tasks
 Add bike name indicator — Show current active bike name (e.g., "HUSQVARNA 701") as a styled label that updates on carousel change
 Add carousel dot indicators — Small dots below the arrows to show position (5 bikes)
