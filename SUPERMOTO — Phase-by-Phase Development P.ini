 Mobile hamburger menu — Replace hidden nav links at ≤480px with a slide-in hamburger drawer
 Keyboard accessibility — Arrow keys to cycle carousel; ESC to close mobile menu
 Fix social link href — Update placeholders to real or # with aria-disabled
